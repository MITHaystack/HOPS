name: CMake on ubuntu-22.04

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_TYPE: RelWithDebInfo

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v5

    - name: InstallHOPS4Deps
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake cmake-curses-gui python3-dev python3-pip wget jq

    - name: InstallHOPS3Deps
      run: |
        sudo apt-get update
        sudo apt-get install -y libfftw3-dev pgplot5 libgfortran5 libx11-dev gnuplot binutils libxpm-dev ghostscript ghostscript-x gsl-bin libgsl-dev libgslcblas0 imagemagick

    - name: Fix ImageMagick PDF policy (required for cohfit_driver test)
      run: |
        sudo sed -i 's/<policy domain="coder" rights="none" pattern="PDF"/<policy domain="coder" rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DHOPS_PYPI_MANAGE_DEPS=ON -DHOPS_ENABLE_UNIT_TESTS=ON -DCMAKE_INSTALL_PREFIX=${{github.workspace}}/install

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} --parallel 6

    - name: Install
      run: cmake --install ${{github.workspace}}/build

    - name: TestDataDownload
      run: bash ${{github.workspace}}/install/bin/testdata_download_all.sh

    - name: Test
      working-directory: ${{github.workspace}}/build
      run: ctest -C ${{env.BUILD_TYPE}}
